<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1600" viewBox="0 0 1800 1600">
  <rect width="1800" height="1600" fill="#ffffff"/>
  <style>
    .title { font: 700 34px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
    .node { font: 600 24px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
    .sub { font: 500 20px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #111827; }
    .minor { font: 400 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #374151; }
  </style>

  <text x="70" y="805" class="title">Harness Engineering</text>

  <path d="M 330 790 C 420 790, 450 200, 560 180" stroke="#2563eb" stroke-width="5" fill="none"/>
  <path d="M 330 790 C 420 790, 450 470, 560 470" stroke="#16a34a" stroke-width="5" fill="none"/>
  <path d="M 330 790 C 420 790, 450 845, 560 845" stroke="#f59e0b" stroke-width="5" fill="none"/>
  <path d="M 330 790 C 420 790, 450 1240, 560 1220" stroke="#ef4444" stroke-width="5" fill="none"/>
  <path d="M 330 790 C 420 790, 450 1475, 560 1450" stroke="#7c3aed" stroke-width="5" fill="none"/>

  <text x="585" y="185" class="node">Harness Engineering 核心概念</text>
  <text x="585" y="475" class="node">AI工程三大阶段演进</text>
  <text x="585" y="850" class="node">成熟 Harness 六层架构</text>
  <text x="585" y="1225" class="node">头部企业实践案例</text>
  <text x="585" y="1455" class="node">三者关系与落地意义</text>

  <path d="M 920 170 C 980 170, 1000 130, 1080 120" stroke="#2563eb" stroke-width="3" fill="none"/>
  <path d="M 920 185 C 980 185, 1000 180, 1080 180" stroke="#2563eb" stroke-width="3" fill="none"/>
  <path d="M 920 200 C 980 200, 1000 230, 1080 250" stroke="#2563eb" stroke-width="3" fill="none"/>
  <text x="1105" y="125" class="sub">定义：AI系统中除模型外，决定稳定交付的运行系统</text>
  <text x="1105" y="185" class="sub">核心价值：让模型不跑偏、跑得稳、出错可恢复</text>
  <text x="1105" y="255" class="sub">与 Agent 关系：Agent = Model + Harness</text>

  <path d="M 920 455 C 980 455, 1000 390, 1080 370" stroke="#16a34a" stroke-width="3" fill="none"/>
  <path d="M 920 470 C 980 470, 1000 470, 1080 470" stroke="#16a34a" stroke-width="3" fill="none"/>
  <path d="M 920 485 C 980 485, 1000 560, 1080 585" stroke="#16a34a" stroke-width="3" fill="none"/>
  <text x="1105" y="375" class="node">Prompt Engineering</text>
  <text x="1290" y="345" class="minor">解决：模型是否听懂指令</text>
  <text x="1290" y="375" class="minor">核心：塑造局部概率空间，优化语言表达</text>
  <text x="1290" y="405" class="minor">局限：无法弥补知识缺失、管理长链路状态</text>
  <text x="1105" y="475" class="node">Context Engineering</text>
  <text x="1290" y="445" class="minor">解决：模型是否获取足够正确信息</text>
  <text x="1290" y="475" class="minor">核心：适时输送决策相关全部信息</text>
  <text x="1290" y="505" class="minor">实践：检索增强、渐进式披露、上下文优化</text>
  <text x="1105" y="590" class="node">Harness Engineering</text>
  <text x="1290" y="560" class="minor">解决：模型真实执行能否持续做对</text>
  <text x="1290" y="590" class="minor">核心：全流程驾驭、监督、约束、纠偏</text>

  <text x="1105" y="705" class="node">上下文管理</text>
  <text x="1320" y="705" class="minor">角色目标定义 / 信息裁剪选择 / 结构化组织</text>
  <text x="1105" y="780" class="node">工具系统</text>
  <text x="1320" y="780" class="minor">工具合理配置 / 工具调用时机 / 结果提炼回喂</text>
  <text x="1105" y="855" class="node">执行编排</text>
  <text x="1320" y="855" class="minor">目标理解 / 信息补全 / 分析生成 / 输出校验修正</text>
  <text x="1105" y="930" class="node">记忆与状态</text>
  <text x="1320" y="930" class="minor">任务状态 / 中间结果 / 长期记忆 / 用户偏好</text>
  <text x="1105" y="1005" class="node">评估与观测</text>
  <text x="1320" y="1005" class="minor">输出验收 / 环境验证 / 自动测试 / 日志 / 指标 / 错误归因</text>
  <text x="1105" y="1080" class="node">约束校验与失败恢复</text>
  <text x="1320" y="1080" class="minor">行为约束 / 输出校验 / 失败重试 / 回滚</text>

  <path d="M 920 1210 C 980 1210, 1000 1160, 1080 1145" stroke="#ef4444" stroke-width="3" fill="none"/>
  <path d="M 920 1225 C 980 1225, 1000 1225, 1080 1225" stroke="#ef4444" stroke-width="3" fill="none"/>
  <path d="M 920 1240 C 980 1240, 1000 1295, 1080 1315" stroke="#ef4444" stroke-width="3" fill="none"/>
  <text x="1105" y="1150" class="node">Anthropic</text>
  <text x="1260" y="1125" class="minor">解决：上下文溢出、自评失真</text>
  <text x="1260" y="1155" class="minor">方案：Context Reset、生产验收分离</text>
  <text x="1105" y="1230" class="node">OpenAI</text>
  <text x="1260" y="1205" class="minor">工程师角色：设计环境、拆解任务、建立反馈</text>
  <text x="1260" y="1235" class="minor">方案：渐进式披露、自主验证、自动治理系统</text>
  <text x="1105" y="1320" class="node">其他企业</text>
  <text x="1260" y="1320" class="minor">仅优化 Harness，也可能大幅提升 AI 系统效率和效果</text>

  <path d="M 920 1440 C 980 1440, 1000 1400, 1080 1385" stroke="#7c3aed" stroke-width="3" fill="none"/>
  <path d="M 920 1455 C 980 1455, 1000 1455, 1080 1455" stroke="#7c3aed" stroke-width="3" fill="none"/>
  <path d="M 920 1470 C 980 1470, 1000 1525, 1080 1540" stroke="#7c3aed" stroke-width="3" fill="none"/>
  <text x="1105" y="1390" class="node">关系</text>
  <text x="1240" y="1390" class="minor">包含关系，Harness 包含 Prompt 与 Context</text>
  <text x="1105" y="1460" class="node">适用场景</text>
  <text x="1240" y="1430" class="minor">单轮生成：Prompt 为主</text>
  <text x="1240" y="1460" class="minor">外部知识依赖：Context 关键</text>
  <text x="1240" y="1490" class="minor">长链路真实场景：Harness 必需</text>
  <text x="1105" y="1545" class="node">核心趋势</text>
  <text x="1240" y="1545" class="minor">AI 落地从“模型更聪明”转向“稳定工作”</text>
</svg>
