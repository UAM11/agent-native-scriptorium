<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1580" viewBox="0 0 1900 1580">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #0f172a; }
      .section { font: 700 24px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #0f172a; }
      .item { font: 600 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1e293b; }
      .body { font: 500 16px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #334155; }
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .blue { fill: #eff6ff; stroke: #60a5fa; }
      .green { fill: #f0fdf4; stroke: #4ade80; }
      .amber { fill: #fffbeb; stroke: #f59e0b; }
      .rose { fill: #fff1f2; stroke: #fb7185; }
      .violet { fill: #f5f3ff; stroke: #a78bfa; }
      .line-blue { stroke: #3b82f6; }
      .line-green { stroke: #22c55e; }
      .line-amber { stroke: #f59e0b; }
      .line-rose { stroke: #f43f5e; }
      .line-violet { stroke: #8b5cf6; }
      .link { fill: none; stroke-width: 4; stroke-linecap: round; }
      .subtle { fill: #64748b; font: 500 14px 'Microsoft YaHei', 'PingFang SC', sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1900" height="1580"/>

  <rect x="80" y="720" width="320" height="140" rx="28" class="card"/>
  <text x="240" y="785" text-anchor="middle" class="title">Harness Engineering</text>
  <text x="240" y="822" text-anchor="middle" class="subtle">初探与演进比较</text>

  <path d="M 400 790 C 470 790, 505 210, 560 190" class="link line-blue"/>
  <path d="M 400 790 C 470 790, 505 470, 560 455" class="link line-green"/>
  <path d="M 400 790 C 470 790, 505 855, 560 870" class="link line-amber"/>
  <path d="M 400 790 C 470 790, 505 1215, 560 1210" class="link line-rose"/>
  <path d="M 400 790 C 470 790, 505 1450, 560 1445" class="link line-violet"/>

  <rect x="560" y="90" width="360" height="220" rx="24" class="card blue"/>
  <text x="590" y="140" class="section">Harness Engineering 核心概念</text>
  <text x="590" y="185" class="item">定义</text>
  <text x="590" y="212" class="body">AI 系统中除模型外，决定稳定交付的运行系统</text>
  <text x="590" y="252" class="item">核心价值</text>
  <text x="590" y="279" class="body">让模型不跑偏、跑得稳、出错可恢复</text>
  <text x="590" y="319" class="item">与 Agent 的关系</text>
  <text x="590" y="346" class="body">Agent = Model + Harness</text>

  <rect x="560" y="350" width="1160" height="335" rx="24" class="card green"/>
  <text x="590" y="400" class="section">AI 工程三大阶段演进</text>

  <rect x="610" y="435" width="320" height="210" rx="20" class="card"/>
  <text x="638" y="475" class="item">Prompt Engineering</text>
  <text x="638" y="515" class="body">解决：模型是否听懂指令</text>
  <text x="638" y="548" class="body">核心：塑造局部概率空间，优化语言表达</text>
  <text x="638" y="581" class="body">局限：无法弥补知识缺失，难以管理长链路状态</text>

  <rect x="980" y="435" width="320" height="210" rx="20" class="card"/>
  <text x="1008" y="475" class="item">Context Engineering</text>
  <text x="1008" y="515" class="body">解决：模型是否获取足够正确信息</text>
  <text x="1008" y="548" class="body">核心：适时输送决策相关的全部信息</text>
  <text x="1008" y="581" class="body">实践：检索增强、渐进式披露、上下文优化</text>

  <rect x="1350" y="435" width="320" height="210" rx="20" class="card"/>
  <text x="1378" y="475" class="item">Harness Engineering</text>
  <text x="1378" y="515" class="body">解决：模型真实执行能否持续做对</text>
  <text x="1378" y="548" class="body">核心：全流程驾驭、监督、约束、纠偏</text>

  <rect x="560" y="735" width="1160" height="410" rx="24" class="card amber"/>
  <text x="590" y="785" class="section">成熟 Harness 六层架构</text>

  <rect x="610" y="825" width="500" height="95" rx="18" class="card"/>
  <text x="638" y="862" class="item">1. 上下文管理</text>
  <text x="638" y="892" class="body">角色目标定义、信息裁剪选择、结构化组织</text>

  <rect x="1170" y="825" width="500" height="95" rx="18" class="card"/>
  <text x="1198" y="862" class="item">2. 工具系统</text>
  <text x="1198" y="892" class="body">工具合理配置、工具调用时机、结果提炼回喂</text>

  <rect x="610" y="940" width="500" height="95" rx="18" class="card"/>
  <text x="638" y="977" class="item">3. 执行编排</text>
  <text x="638" y="1007" class="body">目标理解、信息补全、分析生成、输出校验修正</text>

  <rect x="1170" y="940" width="500" height="95" rx="18" class="card"/>
  <text x="1198" y="977" class="item">4. 记忆与状态</text>
  <text x="1198" y="1007" class="body">任务状态、中间结果、长期记忆、用户偏好</text>

  <rect x="610" y="1055" width="500" height="95" rx="18" class="card"/>
  <text x="638" y="1092" class="item">5. 评估与观测</text>
  <text x="638" y="1122" class="body">输出验收、环境验证、自动测试、日志、指标、错误归因</text>

  <rect x="1170" y="1055" width="500" height="95" rx="18" class="card"/>
  <text x="1198" y="1092" class="item">6. 约束校验与失败恢复</text>
  <text x="1198" y="1122" class="body">行为约束、输出校验、失败重试、回滚</text>

  <rect x="560" y="1175" width="1160" height="185" rx="24" class="card rose"/>
  <text x="590" y="1225" class="section">头部企业实践案例</text>

  <text x="610" y="1272" class="item">Anthropic</text>
  <text x="610" y="1300" class="body">解决：上下文溢出、自评失真</text>
  <text x="610" y="1328" class="body">方案：Context Reset、生产与验收分离</text>

  <text x="1040" y="1272" class="item">OpenAI</text>
  <text x="1040" y="1300" class="body">工程师角色：设计环境、拆解任务、建立反馈</text>
  <text x="1040" y="1328" class="body">方案：渐进式披露、自主验证、自动治理系统</text>

  <text x="1490" y="1272" class="item">其他企业</text>
  <text x="1490" y="1300" class="body">仅优化 Harness，也可能大幅提升 AI 系统排名与效率</text>

  <rect x="560" y="1390" width="1160" height="130" rx="24" class="card violet"/>
  <text x="590" y="1440" class="section">三者关系与落地意义</text>
  <text x="590" y="1475" class="body">关系：Harness 包含 Prompt 与 Context，是更完整的运行系统层</text>
  <text x="590" y="1505" class="body">适用：单轮生成看 Prompt，外部知识依赖看 Context，长链路真实场景必须看 Harness</text>
  <text x="1280" y="1505" class="body">趋势：AI 落地正从“模型更聪明”转向“系统稳定工作”</text>
</svg>
